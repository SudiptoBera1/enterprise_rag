version: '3.8'

services:
  # FastAPI Backend (RAG Engine)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-rag-api
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store
    command: >
      python -m uvicorn api.routes:app 
      --host 0.0.0.0 
      --port 8000
      --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - rag-network
    restart: unless-stopped

  # Streamlit UI (Frontend)
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-rag-ui
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./ui:/app/ui
    command: >
      streamlit run ui/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --logger.level=warning
    networks:
      - rag-network
    restart: unless-stopped

  # Optional: Nginx reverse proxy (production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: enterprise-rag-proxy
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #     - ui
  #   networks:
  #     - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  rag-data:
    driver: local
